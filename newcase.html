<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a New Case</title>
    <link rel="stylesheet" href="newcase.css">
</head>
<body>
    <div class="case-container">
        <h2>Start a New Case</h2>
        <p>Please fill out the form below to start a new case. We will get back to you as soon as possible.</p>
        <form id="newCaseForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>
            
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="Subject" required>
            
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Describe your issue" required></textarea>
            
            <button type="submit">Submit</button>
        </form>
    </div>
    <script src="newcase.js"></script>
</body>
</html>
